name: CI-CD Pipeline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint (ruff)
        run: uv run ruff check src/ || true
      - name: Type check (mypy)
        run: uv run ruff check --select I src/ || true
      - name: Install PySpark
        run: uv add pyspark
      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  validate-and-deploy:
    name: Validate & Deploy
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Validate bundle 
        run: databricks bundle validate --target prod
      - name: Deploy bundle
        run: databricks bundle deploy --target prod