# HTQ2 GTFS Realtime Pipeline Job — SERVERLESS VARIANT
#
# Same 6-task DAG as htq2_pipeline_job.yml but using SERVERLESS compute.
# Used for cost/performance comparison against classic DS4_v2 job clusters.
#
# KEY DIFFERENCES from classic:
#   - No job_clusters section
#   - Each task uses environment_key instead of job_cluster_key
#   - Dependencies defined in environments.spec.dependencies (not task-level libraries)
#   - No cluster startup time (serverless pools are pre-warmed)
#
# NOTE: Auto Loader (cloudFiles) requires a checkpoint on DBFS. Serverless
# compute has access to DBFS, so the checkpoint path works as-is.
#
# TASK DAG:
#   ingest_realtime -> parse_and_enrich -> build_base_tables -> create_all_views -> quality_gate
#                                      -> build_gps_tables  ->

resources:
  jobs:
    htq2_gtfs_pipeline_serverless:
      name: "htq2_gtfs_pipeline_serverless_${bundle.target}"
      max_concurrent_runs: 1
      tags:
        project: htq2
        team: diggibyte
        pipeline_type: realtime
        compute_type: serverless
        version: "3.1.0"

      # Serverless environments (replaces job_clusters)
      environments:
        - environment_key: htq2_env
          spec:
            environment_version: "2"
            dependencies:
              - ../dist/*.whl
              - "gtfs-realtime-bindings>=1.0.0"
              - "requests>=2.31.0"
              - "protobuf>=4.25.0"

        - environment_key: htq2_env_light
          spec:
            environment_version: "2"
            dependencies:
              - ../dist/*.whl

      tasks:
        # --- LAYER 1: INGESTION ---
        - task_key: ingest_realtime
          environment_key: htq2_env
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: ingest
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "bronze"
              - "--volume"
              - "${var.volume_path}"
              - "--run_mode"
              - "realtime"
          max_retries: 2
          min_retry_interval_millis: 30000

        # --- LAYER 2: PREP (Auto Loader) ---
        - task_key: parse_and_enrich
          depends_on:
            - task_key: ingest_realtime
          environment_key: htq2_env
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: prep
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--bronze_schema"
              - "bronze"
              - "--silver_schema"
              - "silver"
              - "--volume"
              - "${var.volume_path}"
              - "--checkpoint_path"
              - "${var.checkpoint_path}"

        # --- LAYER 3: SILVER (parallel) ---
        - task_key: build_base_tables
          depends_on:
            - task_key: parse_and_enrich
          environment_key: htq2_env_light
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: transform
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--bronze_schema"
              - "bronze"
              - "--silver_schema"
              - "silver"
              - "--tables"
              - "base"

        - task_key: build_gps_tables
          depends_on:
            - task_key: parse_and_enrich
          environment_key: htq2_env_light
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: transform
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--bronze_schema"
              - "bronze"
              - "--silver_schema"
              - "silver"
              - "--tables"
              - "gps"

        - task_key: create_all_views
          depends_on:
            - task_key: build_base_tables
          environment_key: htq2_env_light
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: views
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "silver"

        # --- LAYER 4: QUALITY ---
        - task_key: quality_gate
          depends_on:
            - task_key: build_base_tables
            - task_key: build_gps_tables
            - task_key: create_all_views
          environment_key: htq2_env_light
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: validate
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "silver"
              - "--tables"
              - "all"
