# HTQ2 GTFS Realtime Pipeline Job (v3.1.0)
#
# 6-task DAG: ingest -> prep -> base/gps (parallel) -> views -> quality
# Auto Loader for exactly-once file processing
#
# Schedule: dev=PAUSED, prod=every 10 min

resources:
  jobs:
    htq2_gtfs_pipeline:
      name: "htq2_gtfs_pipeline_${bundle.target}"
      max_concurrent_runs: 1
      tags:
        project: htq2
        application: htq2-gtfs-pipeline
        cost_center: transit-analytics
        owner: data-engineering
        pipeline_type: realtime
        version: "3.1.0"
      schedule:
        quartz_cron_expression: "0 */10 * * * ?"
        timezone_id: "Europe/Stockholm"
        pause_status: PAUSED

      job_clusters:
        - job_cluster_key: htq2_cluster
          new_cluster:
            data_security_mode: DATA_SECURITY_MODE_AUTO
            kind: CLASSIC_PREVIEW
            spark_version: "17.3.x-scala2.13"
            node_type_id: "Standard_DS4_v2"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
              spark.sql.adaptive.enabled: "true"
            custom_tags:
              project: htq2
              application: htq2-gtfs-pipeline
              cost_center: transit-analytics
              owner: data-engineering
              env: "${bundle.target}"
              pipeline_type: realtime
              managed_by: databricks-asset-bundle
            enable_elastic_disk: true
            is_single_node: true

      tasks:
        - task_key: ingest_realtime
          job_cluster_key: htq2_cluster
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: ingest
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "bronze"
              - "--volume"
              - "${var.volume_path}"
              - "--run_mode"
              - "realtime"
          libraries:
            - whl: ../dist/*.whl
            - pypi:
                package: "gtfs-realtime-bindings>=1.0.0"
            - pypi:
                package: "requests>=2.31.0"
            - pypi:
                package: "protobuf>=4.25.0"
          max_retries: 2
          min_retry_interval_millis: 30000

        - task_key: parse_and_enrich
          depends_on:
            - task_key: ingest_realtime
          job_cluster_key: htq2_cluster
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: prep
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--bronze_schema"
              - "bronze"
              - "--silver_schema"
              - "silver"
              - "--volume"
              - "${var.volume_path}"
              - "--checkpoint_path"
              - "${var.checkpoint_path}"
          libraries:
            - whl: ../dist/*.whl
            - pypi:
                package: "gtfs-realtime-bindings>=1.0.0"
            - pypi:
                package: "requests>=2.31.0"
            - pypi:
                package: "protobuf>=4.25.0"

        - task_key: build_base_tables
          depends_on:
            - task_key: parse_and_enrich
          job_cluster_key: htq2_cluster
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: transform
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--bronze_schema"
              - "bronze"
              - "--silver_schema"
              - "silver"
              - "--tables"
              - "base"
          libraries:
            - whl: ../dist/*.whl

        - task_key: build_gps_tables
          depends_on:
            - task_key: parse_and_enrich
          job_cluster_key: htq2_cluster
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: transform
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--bronze_schema"
              - "bronze"
              - "--silver_schema"
              - "silver"
              - "--tables"
              - "gps"
          libraries:
            - whl: ../dist/*.whl

        - task_key: create_all_views
          depends_on:
            - task_key: build_base_tables
          job_cluster_key: htq2_cluster
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: views
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "silver"
          libraries:
            - whl: ../dist/*.whl

        - task_key: quality_gate
          depends_on:
            - task_key: build_base_tables
            - task_key: build_gps_tables
            - task_key: create_all_views
          job_cluster_key: htq2_cluster
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: validate
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "silver"
              - "--tables"
              - "all"
          libraries:
            - whl: ../dist/*.whl
