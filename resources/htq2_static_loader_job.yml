# HTQ2 Static GTFS Loader Job (v3.1.0)
#
# Manual trigger — run when new static GTFS ZIP uploaded to Volume.
# Single-node DS2_v2 (2 cores, 7GB) — CSV read + Delta write.

resources:
  jobs:
    htq2_static_loader:
      name: "htq2_static_loader_${bundle.target}"
      max_concurrent_runs: 1
      tags:
        project: htq2
        application: htq2-gtfs-pipeline
        cost_center: transit-analytics
        owner: data-engineering
        pipeline_type: static_loader
        trigger: manual
        version: "3.1.0"

      job_clusters:
        - job_cluster_key: static_cluster
          new_cluster:
            data_security_mode: DATA_SECURITY_MODE_AUTO
            kind: CLASSIC_PREVIEW
            spark_version: "17.3.x-scala2.13"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
              spark.sql.adaptive.enabled: "true"
            custom_tags:
              project: htq2
              application: htq2-gtfs-pipeline
              cost_center: transit-analytics
              owner: data-engineering
              env: "${bundle.target}"
              pipeline_type: static_loader
              managed_by: databricks-asset-bundle
            enable_elastic_disk: true
            is_single_node: true

      tasks:
        - task_key: load_static_gtfs
          job_cluster_key: static_cluster
          python_wheel_task:
            package_name: htq2_gtfs
            entry_point: load_static
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "bronze"
              - "--volume"
              - "${var.volume_path}"
          libraries:
            - whl: ../dist/*.whl
