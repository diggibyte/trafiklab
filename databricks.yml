bundle:
  name: htq2-gtfs-pipeline

variables:
  catalog:
    description: "Unity Catalog catalog name"
    default: htq2_dev
  volume_path:
    description: "Volume name for raw data"
    default: trafiklab_raw
  checkpoint_path:
    description: "Auto Loader checkpoint on UC Volume (exactly-once)"
    default: "/Volumes/${var.catalog}/bronze/${var.volume_path}/checkpoints/autoloader"

artifacts:
  htq2_gtfs_wheel:
    type: whl
    path: .
    build: python -m build --wheel

include:
  - resources/*.yml

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: ${workspace.host}
    variables:
      catalog: htq2_dev

  prod:
    workspace:
      host: ${workspace.host}
    variables:
      catalog: htq2_prod
    resources:
      jobs:
        htq2_gtfs_pipeline:
          schedule:
            quartz_cron_expression: "0 */10 * * * ?"
            timezone_id: "Europe/Stockholm"
            pause_status: UNPAUSED
